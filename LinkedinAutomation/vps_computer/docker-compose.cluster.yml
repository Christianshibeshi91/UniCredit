services:
  redis:
    image: redis:7-alpine
    container_name: cluster-redis
    command: >
      redis-server
      --maxmemory 50mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --tcp-backlog 128
      --timeout 300
    ports:
      - "6379:6379"
    networks:
      - cluster-net
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.5"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cluster-qdrant
    environment:
      - QDRANT__STORAGE__ON_DISK_PAYLOAD=true
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=2
      - QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB=1024
      - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - cluster-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "1.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  qdrant-data:
    driver: local

networks:
  cluster-net:
    driver: bridge
